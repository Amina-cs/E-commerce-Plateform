<h:html xmlns:h="http://xmlns.jcp.org/jsf/html">
    <h:head>
        <h:outputStylesheet library="css" name="style.css"/>
        <title>Accueil</title>
    </h:head>

    <h:body>

        <div class="navbar">
            Bienvenue #{authBean.client.prenom}
        </div>

        <div class="container">

            <div class="card">
                <h2>👋 Accueil</h2>

                <h:link styleClass="btn" value="🛍️ Produits" outcome="produits.xhtml"/>
                <h:link styleClass="btn" value="❤️ Favoris" outcome="favoris.xhtml"/>
                <h:link styleClass="btn" value="🛒 Panier" outcome="panier.xhtml"/>

                <br/><br/>

                <h:form>
                    <h:commandButton styleClass="btn" value="🚪 Logout" action="#{authBean.logout}" />
                </h:form>
            </div>

            <div class="card">
                <h3>📌 Infos</h3>
                Email : #{authBean.client.email} <br/>
                Téléphone : #{authBean.client.num}
            </div>

        </div>

    </h:body>
</h:html>
