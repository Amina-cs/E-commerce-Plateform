<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://xmlns.jcp.org/jsf/passthrough">

    <f:view >
        <h:head>
            <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/signup.css?v=#{now.time}" />
            <title>Maroché - Créer un compte</title>
        </h:head>
        <h:body>
            <div class="container" style="max-width: 550px;">
                <div class="card">
                    <h2>🌿 Créer un compte</h2>
                    <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 14px;">Rejoignez la communauté Maroché.</p>

                    <h:form id="signupForm">
                        <h:messages globalOnly="true" styleClass="error-msg" />

                        <div class="form-grid">
                            <div class="input-group">
                                <h:outputLabel for="nom" value="Nom" />
                                <h:inputText id="nom" value="#{authBean.nom}" required="true"
                                             requiredMessage="Le nom est requis" p:placeholder="Nom" />
                                <h:message for="nom" styleClass="field-error" />
                            </div>
                            <div class="input-group">
                                <h:outputLabel for="prenom" value="Prénom" />
                                <h:inputText id="prenom" value="#{authBean.prenom}" required="true"
                                             requiredMessage="Le prénom est requis" p:placeholder="Prénom" />
                                <h:message for="prenom" styleClass="field-error" />
                            </div>
                        </div>

                        <div class="input-group">
                            <h:outputLabel for="email" value="Email" />
                            <h:inputText id="email" value="#{authBean.registerEmail}" required="true"
                                         requiredMessage="L'email est requis" p:placeholder="votre@email.com">
                                <f:validateRegex pattern="^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$" />
                            </h:inputText>
                            <h:message for="email" styleClass="field-error" />
                        </div>

                        <div class="input-group">
                            <h:outputLabel for="pwd" value="Mot de passe" />
                            <h:inputSecret id="pwd" value="#{authBean.registerPassword}" required="true"
                                           requiredMessage="Mot de passe requis" p:placeholder="••••••••">
                                <f:validateLength minimum="6" />
                            </h:inputSecret>
                            <h:message for="pwd" styleClass="field-error" />
                        </div>

                        <div class="sidebar-title">Coordonnées de livraison</div>

                        <div class="input-group">
                            <h:outputLabel for="rue" value="Rue (Optionnel)" />
                            <h:inputText id="rue" value="#{authBean.rue}" p:placeholder="ex: 12 Rue des Fleurs" />
                        </div>

                        <div class="form-grid">
                            <div class="input-group">
                                <h:outputLabel for="ville" value="Ville (Optionnel)" />
                                <h:inputText id="ville" value="#{authBean.ville}" p:placeholder="Casablanca" />
                            </div>
                            <div class="input-group">
                                <h:outputLabel for="tel" value="Téléphone" />
                                <h:inputText id="tel" value="#{authBean.num}" required="true"
                                             requiredMessage="Numéro requis" p:placeholder="06..." />
                                <h:message for="tel" styleClass="field-error" />
                            </div>
                        </div>

                        <h:commandButton styleClass="btn" value="S'inscrire" action="#{authBean.register}" />
                    </h:form>

                    <div style="margin-top: 20px;">
                        <h:link value="Déjà un compte ? Se connecter" outcome="login"/>
                    </div>
                </div>
            </div>
        </h:body>
    </f:view>

</html>
