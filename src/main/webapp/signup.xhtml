<h:html xmlns:h="http://xmlns.jcp.org/jsf/html">
    <h:head>
        <h:outputStylesheet library="css" name="style.css"/>
        <title>Login</title>
    </h:head>

    <h:body>

        <h:form>

            <h:outputLabel value="Email:" />
            <h:inputText value="#{authBean.loginEmail}" />

            <br/>

            <h:outputLabel value="Mot de passe:" />
            <h:inputSecret value="#{authBean.loginPassword}" />

            <br/>

            <h:commandButton value="Login" action="#{authBean.login}" />

        </h:form>

        <h:outputText value="Erreur login !" rendered="#{param.error != null}" style="color:red"/>
        <h:link value="Créer un compte" outcome="signup.xhtml"/>

    </h:body>
</h:html>
