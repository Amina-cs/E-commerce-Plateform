<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Merci pour votre commande - Maroché</title>
</h:head>
<h:body style="background-color: #E8E0D0">
    <div class="navbar">
        <h:link outcome="acceuil" style=" font-family: 'Cormorant Garamond', serif;
           font-size: 22px;
           font-weight: 600;
           color: #4A6B4A;
           letter-spacing: 0.04em;
           margin-top: 15px;
           margin-left: 10px;
           text-decoration: none;">Maro<span>ché</span></h:link>
    </div>

    <div  style=" display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;">
        <div style=" background:#FAF7F2;
                padding: 50px;
                border-radius: 20px;
                border: 1px solid #D6CCBA;
                text-align: center;
                max-width: 500px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.03);">
            <div style="width: 60px;
                height: 60px;
                background:#4A6B4A;
                color: white;
                font-size: 30px;
                line-height: 60px;
                border-radius: 50%;
                margin: 0 auto 20px;">✓</div>
            <h1 style="font-family:'Cormorant Garamond', serif;
                color: #2C2C2A;
                margin-bottom: 15px;">Paiement Confirmé</h1>
            <p style="color: #7A7060;
                line-height: 1.6;
                font-size: 15px;">Merci pour votre confiance. Votre commande est en cours de préparation .</p>

            <div style="margin-top: 25px;
                padding: 15px;
                background: white;
                border-radius: 10px;
                border: 1px solid #D6CCBA;
                display: flex;
                flex-direction: column;
                gap: 5px;
                font-size: 13px;
                color: #A89F90;">
                <span>Numéro de commande : #MAR-#{now.time % 10000}</span>
                <span>Statut : Préparation</span>
            </div>

            <h:link outcome="acceuil" value="Retour à la boutique"  style="margin-top: 30px;
                       background: #4A6B4A;
                       color: #FAF7F2;
                       border: none;
                       border-radius: 20px;
                       padding: 7px 20px;
                       font-size: 13px;
                       font-family: 'DM Sans', sans-serif;
                       font-weight: 500;
                       cursor: pointer;
                       letter-spacing: 0.02em;
                       transition: background 0.2s;
                       text-decoration: none;
                       display: inline-flex;
                       align-items: center;" />
        </div>
    </div>
</h:body>
</html>
