<h:html xmlns:h="http://xmlns.jcp.org/jsf/html">
    <h:head>
        <h:outputStylesheet library="css" name="style.css"/>
        <title>Login</title>
    </h:head>

    <h:body>

        <div class="container">

            <div class="card">

                <h2>🔐 Login</h2>

                <h:form>

                    Email :
                    <h:inputText value="#{authBean.loginEmail}" /><br/><br/>

                    Mot de passe :
                    <h:inputSecret value="#{authBean.loginPassword}" /><br/><br/>

                    <h:commandButton styleClass="btn" value="Login" action="#{authBean.login}" />

                </h:form>

                <h:outputText value="Erreur login !" rendered="#{param.error != null}" style="color:red"/>

                <br/>
                <h:link value="Créer un compte" outcome="signup.xhtml"/>

            </div>

        </div>

    </h:body>
</h:html>
