<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://xmlns.jcp.org/jsf/passthrough">
<f:view>
    <h:head>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/login.css?v=#{now.time}" />
        <title>Login</title>
    </h:head>

    <h:body>
        <div class="container">
            <div class="card">
                <div class="brand-logo">Maro<span>ché</span></div>
                <h2>Connexion</h2>
                <p class="subtitle">Heureux de vous revoir.</p>

                <h:form id="loginForm">
                    <div class="input-group">
                        <h:outputLabel value="Adresse Email"  />
                        <h:inputText id="email" value="#{authBean.loginEmail}" required="true"
                                     requiredMessage="L'email est obligatoire"
                                     p:placeholder="votre@email.com">
                        </h:inputText>
                        <h:message for="email" styleClass="error-msg" />
                    </div>

                    <div class="input-group">
                        <h:outputLabel value="Mot de passe" />
                        <h:inputSecret id="pwd" value="#{authBean.loginPassword}" required="true"
                                       requiredMessage="Mot de passe requis">
                        </h:inputSecret>
                        <h:message for="pwd" styleClass="error-msg" />
                    </div>

                    <h:commandButton styleClass="btn-submit" value="Se connecter" action="#{authBean.login}" />
                </h:form>

                <h:outputText value="Identifiants invalides. Veuillez réessayer."
                              rendered="#{param.error != null}"
                              styleClass="error-msg"/>

                <div class="footer-links">
                    <span>Nouveau ici ?</span>
                    <h:link value="Créer un compte" outcome="signup?faces-redirect=true" />
                </div>
            </div>
        </div>
    </h:body>
</f:view>
</html>
